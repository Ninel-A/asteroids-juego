<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juego-Asteroids 1.0</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  
  <canvas id="gameCanvas"></canvas>

  <div id="barraEstado">
    <span id="score">PUNTOS: 0</span>
    <span id="lives">VIDAS: 3</span>
  </div>

  <!-- Pantalla de inicio -->
  <div id="screen-menu" class="screen">
    <h1>ASTEROIDS</h1>
    <p>Usa las flechas para moverte<br>ESPACIO para disparar</p>
    <button id="btn-start">JUGAR</button>
  </div>

  <!-- Pantalla de game over -->
  <div id="screen-gameover" class="screen hidden">
    <h1>GAME OVER</h1>
    <p id="final-score">Puntos: 0</p>
    <button id="btn-restart">REINTENTAR</button>
  </div>

  <script>
    const FPS = 30;
  const FRICTION = 0.7; //coeficiente de fricción de la nave
  const SHIP_SIZE = 30;
  const SHIP_THRUST = 5; //aceleración 
  const TURN_SPEED = 360; 

  var canv = document.getElementById("gameCanvas");
  var ctx = canv.getContext("2d");

  
  canv.width = window.innerWidth;
  canv.height = window.innerHeight;

  var ship = {
    x: canv.width / 2,
    y: canv.height / 2,
    r: SHIP_SIZE / 2,
    a: 90 / 180 * Math.PI,
    rot: 0,
    thrusting: false,
    thrust : {
      x: 0,
      y: 0  
    }
  };

  var gameRunning = false;

  
  document.getElementById("btn-start").addEventListener("click", function () {
    document.getElementById("screen-menu").classList.add("hidden");
    gameRunning = true;
  });


  document.addEventListener("keydown", keyDown) ;
  document.addEventListener("keyup", keyUp );

  setInterval(update, 1000 / FPS);


  

  function keyDown (/** @type {KeyboardEvent} */ ev ) {
    switch (ev.keyCode) {
      case 37: //rotar a la izquierda
        ship.rot = TURN_SPEED / 180 * Math.PI / FPS;
        break;
      case 38: //  thrusting
        ship.thrusting = true;
        break;
      case 39: //rotar a la derecha 
        ship.rot = -TURN_SPEED / 180 * Math.PI / FPS;
        break;
    }
  }


  function keyUp (/** @type {KeyboardEvent} */ ev ) {
    switch (ev.keyCode) {
      case 37: //parar rotación a la izquierda
        ship.rot = 0;
        break;
      case 38: //  parar thrusting
        ship.thrusting = false;
        break;
      case 39: //parar rotación a la derecha 
        ship.rot = 0;
        break;
    }
  }

  function update() {
    if (!gameRunning) return;

    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canv.width, canv.height);

    // thrust
    if (ship.thrusting) {
      ship.thrust.x += SHIP_THRUST * Math.cos(ship.a) /FPS ;
      ship.thrust.y -= SHIP_THRUST * Math.sin(ship.a) /FPS ;

      // potencia de forma visual 
      ctx.fillStyle = "yellow";
      ctx.strokeStyle = "orange";
      ctx.lineWidth = SHIP_SIZE / 10;
      ctx.beginPath();
      ctx.moveTo(
        ship.x - ship.r * (2 / 3 * Math.cos(ship.a) + 0.5 * Math.sin(ship.a)),
        ship.y + ship.r * (2 / 3 * Math.sin(ship.a) - 0.5 * Math.cos(ship.a))
      );
      ctx.lineTo(
        ship.x - ship.r * (4 / 3 * Math.cos(ship.a) ),
        ship.y + ship.r * (4 / 3 * Math.sin(ship.a) )
      );
      ctx.lineTo(
        ship.x - ship.r * (2 / 3 * Math.cos(ship.a) - 0.5 * Math.sin(ship.a)),
        ship.y + ship.r * (2 / 3 * Math.sin(ship.a) + 0.5 * Math.cos(ship.a))
      );
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    } else {
      // fricción
      ship.thrust.x -= FRICTION * ship.thrust.x / FPS;
      ship.thrust.y -= FRICTION * ship.thrust.y / FPS;
    }


    ctx.strokeStyle = "white";
    ctx.lineWidth = SHIP_SIZE / 20;
    ctx.beginPath();
    ctx.moveTo(
      ship.x + 4 / 3 * ship.r * Math.cos(ship.a),
      ship.y -  4 / 3 * ship.r * Math.sin(ship.a)
    );
    ctx.lineTo(
      ship.x - ship.r * (2 / 3 * Math.cos(ship.a) + Math.sin(ship.a)),
      ship.y + ship.r * (2 / 3 * Math.sin(ship.a) - Math.cos(ship.a))
    );
    ctx.lineTo(
      ship.x - ship.r * (2 / 3 * Math.cos(ship.a) - Math.sin(ship.a)),
      ship.y + ship.r * (2 / 3 * Math.sin(ship.a) + Math.cos(ship.a))
    );
    ctx.closePath();
    ctx.stroke();


    //ROTAR
    ship. a += ship.rot;

    //MOVER NAVE
    ship.x += ship.thrust.x;
    ship.y += ship.thrust.y;

    //BORDES DE LA PANTALLA
    if (ship.x < 0 - ship.r) {
      ship.x = canv.width + ship.r;
    } else if (ship.x > canv.width + ship.r) {
      ship.x = 0 - ship.r;
    }
    if (ship.y < 0 - ship.r) {
      ship.y = canv.height + ship.r;
    } else if (ship.y > canv.height + ship.r) {
      ship.y = 0 - ship.r;
    }

    //punto central
    ctx.fillStyle = "red";
    ctx.fillRect(ship.x - 1, ship.y - 1, 2, 2);
  }
    

  </script>

</body>
</html>
