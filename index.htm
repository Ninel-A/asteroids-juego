<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Juego-Asteroids 1.0</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  
  <canvas id="gameCanvas"></canvas>

  <div id="barraEstado">
    <span id="score">PUNTOS: 0</span>
    <span id="lives">VIDAS: 3</span>
  </div>

  <!-- Pantalla de inicio -->
  <div id="screen-menu" class="screen">
    <h1>ASTEROIDS</h1>
    <p>Usa las flechas para moverte<br>ESPACIO para disparar</p>
    <button id="btn-start">JUGAR</button>
  </div>

  <!-- Pantalla de game over -->
  <div id="screen-gameover" class="screen hidden">
    <h1>GAME OVER</h1>
    <p id="final-score">Puntos: 0</p>
    <button id="btn-restart">REINTENTAR</button>
  </div>

  <script>
  const FPS = 30;
  const FRICTION = 0.7; //coeficiente de fricción de la nave
  const LASER_MAX = 10; // número máximo de lasers en pantalla
  const LASER_SPD = 500; // velocidad de los lasers en píxeles por segundo
  const ASTEROIDS_JAG = 0.5; //probabilidad de que un asteroide se divida al ser destruido
  const Num_ASTEROIDS = 3;
  const ASTEROIDS_SPD = 50; //velocidad máxima de los asteroides en píxeles por segundo
  const ASTEROIDS_VERT = 10; // número máximo de vértices de los asteroides
  const ASTEROIDS_SIZE = 100; //tamaño inicial de los asteroides
  const SHIP_SIZE = 30;
  const SHIP_THRUST = 5; //aceleración 
  const TURN_SPEED = 360; 

  var canv = document.getElementById("gameCanvas");
  var ctx = canv.getContext("2d");

  
  canv.width = window.innerWidth;
  canv.height = window.innerHeight;

  var ship = {
    x: canv.width / 2,
    y: canv.height / 2,
    r: SHIP_SIZE / 2,
    canShoot: true,
    lasers: [],
    a: 90 / 180 * Math.PI,
    rot: 0,
    thrusting: false,
    thrust : {
      x: 0,
      y: 0  
    }
  };

  // asteroides 
  var asteroids = [];
  createAsteroidBelt();

  var gameRunning = false;
  var lives = 3;

  
  document.getElementById("btn-start").addEventListener("click", function () {
    document.getElementById("screen-menu").classList.add("hidden");
    gameRunning = true;
  });


  document.addEventListener("keydown", keyDown) ;
  document.addEventListener("keyup", keyUp );

  setInterval(update, 1000 / FPS);

  function shootLaser() {
    if (ship.canShoot && ship.lasers.length < LASER_MAX) {
      ship.lasers.push({
        x: ship.x + 4 / 3 * ship.r * Math.cos(ship.a),
        y: ship.y - 4 / 3 * ship.r * Math.sin(ship.a),
        xv: LASER_SPD * Math.cos(ship.a) / FPS,
        yv: -LASER_SPD * Math.sin(ship.a) / FPS
      });
    }
    ship.canShoot = false;
  }

  function createAsteroidBelt() {
    asteroids = [];
    var x, y;
    for (var i = 0; i < Num_ASTEROIDS; i++) {
      do {
      x = Math.floor (Math.random() * canv.width);
      y = Math.floor (Math.random() * canv.height);
      } while (distanceBetweenPoints(ship.x, ship.y, x, y) < ASTEROIDS_SIZE * 2 + ship.r);
      asteroids.push (newAsteroid(x, y));
    }
  }

  function distanceBetweenPoints(x1, y1, x2, y2) {
    return Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
  }
  

  function keyDown (/** @type {KeyboardEvent} */ ev ) {
    switch (ev.keyCode) {
      case 32: //disparar
        shootLaser ();
        break;
      case 37: //rotar a la izquierda
        ship.rot = -TURN_SPEED / 180 * Math.PI / FPS;
        break;
      case 38: //  thrusting
        ship.thrusting = true;
        break;
      case 39: //rotar a la derecha 
        ship.rot = +TURN_SPEED / 180 * Math.PI / FPS;
        break;
    }
  }


  function keyUp (/** @type {KeyboardEvent} */ ev ) {
    switch (ev.keyCode) {
      case 32: //disparar otra vez
        ship.canShoot = true;
        break;
      case 37: //parar rotación a la izquierda
        ship.rot = 0;
        break;
      case 38: //  parar thrusting
        ship.thrusting = false;
        break;
      case 39: //parar rotación a la derecha 
        ship.rot = 0;
        break;
    }
  }

  function newAsteroid(x, y) {
    var asteroid = {
      x: x,
      y: y,
      xv: Math.random() * ASTEROIDS_SPD/ FPS * (Math.random() < 0.5 ? 1 : -1), // velocidad aleatoria
      yv: Math.random() * ASTEROIDS_SPD/ FPS * (Math.random() < 0.5 ? 1 : -1), // velocidad aleatoria
      r: ASTEROIDS_SIZE / 2,
      a: Math.random() * Math.PI * 2, // dirección aleatoria
      vert: Math.floor(Math.random() * (ASTEROIDS_VERT +1) + ASTEROIDS_VERT / 2 ), // número de vértices aleatorio
      rot: (Math.random() - 0.5) * 0.02, // velocidad de rotación aleatoria
      offs: [],
      speed: Math.random() * 1.5 + 0.5, // velocidad aleatoria
      velX: 0,
      velY: 0
    };
    for (var i = 0; i < asteroid.vert; i++) {
      asteroid.offs.push(Math.random() * ASTEROIDS_JAG * 2 + 1 - ASTEROIDS_JAG);
    } 
    // calcular la velocidad en función de la dirección y la velocidad
    asteroid.velX = ASTEROIDS_SPD * Math.cos(asteroid.a);
    asteroid.velY = ASTEROIDS_SPD * Math.sin(asteroid.a);

    return asteroid;
  }


  function checkCollisions() {
  for (var i = 0; i < asteroids.length; i++) {
    if (distanceBetweenPoints(ship.x, ship.y, asteroids[i].x, asteroids[i].y) < ship.r + asteroids[i].r) {
      lives--;
      document.getElementById("lives").textContent = "VIDAS: " + lives;
      
      // regresar la nave al centro
      ship.x = canv.width / 2;
      ship.y = canv.height / 2;
      ship.thrust.x = 0;
      ship.thrust.y = 0;
    }
  }
}


  function update() {
    if (!gameRunning) return;

    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canv.width, canv.height);

    // thrust
    if (ship.thrusting) {
      ship.thrust.x += SHIP_THRUST * Math.cos(ship.a) /FPS ;
      ship.thrust.y -= SHIP_THRUST * Math.sin(ship.a) /FPS ;

      // potencia de forma visual 
      ctx.fillStyle = "yellow";
      ctx.strokeStyle = "orange";
      ctx.lineWidth = SHIP_SIZE / 10;
      ctx.beginPath();
      ctx.moveTo(
        ship.x - ship.r * (2 / 3 * Math.cos(ship.a) + 0.5 * Math.sin(ship.a)),
        ship.y + ship.r * (2 / 3 * Math.sin(ship.a) - 0.5 * Math.cos(ship.a))
      );
      ctx.lineTo(
        ship.x - ship.r * (4 / 3 * Math.cos(ship.a) ),
        ship.y + ship.r * (4 / 3 * Math.sin(ship.a) )
      );
      ctx.lineTo(
        ship.x - ship.r * (2 / 3 * Math.cos(ship.a) - 0.5 * Math.sin(ship.a)),
        ship.y + ship.r * (2 / 3 * Math.sin(ship.a) + 0.5 * Math.cos(ship.a))
      );
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    } else {
      // fricción
      ship.thrust.x -= FRICTION * ship.thrust.x / FPS;
      ship.thrust.y -= FRICTION * ship.thrust.y / FPS;
    }


    ctx.strokeStyle = "white";
    ctx.lineWidth = SHIP_SIZE / 20;
    ctx.beginPath();
    ctx.moveTo(
      ship.x + 4 / 3 * ship.r * Math.cos(ship.a),
      ship.y -  4 / 3 * ship.r * Math.sin(ship.a)
    );
    ctx.lineTo(
      ship.x - ship.r * (2 / 3 * Math.cos(ship.a) + Math.sin(ship.a)),
      ship.y + ship.r * (2 / 3 * Math.sin(ship.a) - Math.cos(ship.a))
    );
    ctx.lineTo(
      ship.x - ship.r * (2 / 3 * Math.cos(ship.a) - Math.sin(ship.a)),
      ship.y + ship.r * (2 / 3 * Math.sin(ship.a) + Math.cos(ship.a))
    );
    ctx.closePath();
    ctx.stroke();

    //dibujar los lasers
    for (var i = 0; i < ship.lasers.length; i++) {
      ctx.fillStyle = "salmon";
      ctx.beginPath();
      ctx.arc(ship.lasers[i].x, ship.lasers[i].y, SHIP_SIZE / 15, 0, Math.PI * 2, false);
      ctx.fill();

      //mover lasers
      ship.lasers[i].x += ship.lasers[i].xv;
      ship.lasers[i].y += ship.lasers[i].yv;

      // eliminar lasers que salen de la pantalla
      if (ship.lasers[i].x < 0 || ship.lasers[i].x > canv.width || ship.lasers[i].y < 0 || ship.lasers[i].y > canv.height) {
        ship.lasers.splice(i, 1);
        i--;
      }
    }
    //Dibujar asteroides
    ctx.strokeStyle = "slategrey";
    ctx.lineWidth = SHIP_SIZE / 20;
    var x, y, r, a, vert, offs; 
    for (var i = 0; i < asteroids.length; i++) {

      //get propiedades
      x = asteroids[i].x;
      y = asteroids[i].y;
      r = asteroids[i].r;
      a = asteroids[i].a;
      vert = asteroids[i].vert;
      offs = asteroids[i].offs;
      
      ctx.beginPath();
      ctx.moveTo(
        x + r * offs [0] * Math.cos(a),
        y + r * offs [0] * Math.sin(a) 
      );

      // dibujar poligono
      for (var j = 1; j < vert; j++) {
        ctx.lineTo(
          x + r * offs[j] * Math.cos(a + j * Math.PI * 2 / vert),
          y + r * offs[j] * Math.sin(a + j * Math.PI * 2 / vert)
        );
      }
      ctx.closePath();
      ctx.stroke();

      //mover asteroides
      
asteroids[i].x += asteroids[i].velX / FPS;
asteroids[i].y += asteroids[i].velY / FPS;

      //borde de pantalla para asteroides
      if (asteroids[i].x < 0 - asteroids[i].r) {
       asteroids[i].x = canv.width + asteroids[i].r;
      } else if (asteroids[i].x > canv.width + asteroids[i].r) {
       asteroids[i].x = 0 - asteroids[i].r;
      }
      if (asteroids[i].y < 0 - asteroids[i].r) {
       asteroids[i].y = canv.height + asteroids[i].r;
      } else if (asteroids[i].y > canv.height + asteroids[i].r) {
       asteroids[i].y = 0 - asteroids[i].r;
    }
     
    }


    //ROTAR
    ship. a += ship.rot;

    //MOVER NAVE
    ship.x += ship.thrust.x;
    ship.y += ship.thrust.y;

    //BORDES DE LA PANTALLA
    if (ship.x < 0 - ship.r) {
      ship.x = canv.width + ship.r;
    } else if (ship.x > canv.width + ship.r) {
      ship.x = 0 - ship.r;
    }
    if (ship.y < 0 - ship.r) {
      ship.y = canv.height + ship.r;
    } else if (ship.y > canv.height + ship.r) {
      ship.y = 0 - ship.r;
    }

    // colisiones
    checkCollisions();

    
    //punto central
    ctx.fillStyle = "red";
    ctx.fillRect(ship.x - 1, ship.y - 1, 2, 2);
  }
    

  </script>

</body>
</html>
